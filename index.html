<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiGravity Chess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar left-sidebar">
            <div class="logo-container">
                <div class="logo-icon">◈</div>
                <h1 class="logo">Chess</h1>
                <span class="logo-subtitle">Professional Edition</span>
            </div>

            <div id="room-info" class="panel hidden">
                <div class="panel-header">
                    <span class="panel-icon">🌐</span>
                    <h3>Online Match</h3>
                </div>
                <div class="room-details">
                    <span class="room-label">Room Code:</span>
                    <strong id="room-code-display" class="room-code">------</strong>
                </div>
            </div>

            <div class="controls panel">
                <button id="btn-new-game" class="btn primary">
                    <span class="btn-icon">⬡</span>
                    <span>New Game</span>
                </button>
                <div class="btn-row">
                    <button id="btn-undo" class="btn">
                        <span class="btn-icon">↲</span>
                        <span>Undo</span>
                    </button>
                    <button id="btn-flip" class="btn">
                        <span class="btn-icon">⇆</span>
                        <span>Flip</span>
                    </button>
                </div>
                <button id="btn-hints" class="btn toggle">
                    <span class="toggle-indicator"></span>
                    <span>Legal Hints</span>
                </button>
            </div>

            <div class="captured-panel panel">
                <div class="panel-header">
                    <span class="panel-icon">⬢</span>
                    <h3>Captured</h3>
                </div>
                <div class="pieces-box" id="captured-by-white"></div>
            </div>

            <div class="captured-panel panel dark">
                <div class="panel-header dark">
                    <span class="panel-icon">⬢</span>
                    <h3>Opponent</h3>
                </div>
                <div class="pieces-box" id="captured-by-black"></div>
            </div>
        </aside>

        <main class="board-area">
            <div class="board-wrapper" id="board-wrapper">
                <div class="board-frame">
                    <div class="corner-tl"></div>
                    <div class="corner-tr"></div>
                    <div class="corner-bl"></div>
                    <div class="corner-br"></div>
                    <div class="rank-labels" id="rank-labels"></div>
                    <div class="file-labels" id="file-labels"></div>
                    <div id="board" class="chessboard player-white"></div>
                </div>
                <div class="scanline"></div>
            </div>
            <div class="game-status" id="game-status">
                <div class="status-indicator"></div>
                <span id="status-text">White to move</span>
            </div>
        </main>

        <aside class="sidebar right-sidebar">
            <div class="panel move-log">
                <div class="panel-header">
                    <span class="panel-icon">▤</span>
                    <h3>Move History</h3>
                </div>
                <div id="move-history" class="move-list"></div>
            </div>

            <div class="panel ai-coach">
                <div class="coach-header">
                    <div class="coach-avatar">
                        <span class="avatar-icon">◈</span>
                        <span class="avatar-pulse"></span>
                    </div>
                    <div class="coach-title">
                        <span class="coach-name">Claude Coach</span>
                        <span class="coach-status">Online</span>
                    </div>
                </div>
                <div class="coach-chat" id="coach-chat">
                    <div class="msg assistant">
                        <div class="msg-icon">◈</div>
                        <div class="msg-content">Ready to analyze. Ask me about the position, openings, or strategy.
                        </div>
                    </div>
                </div>
                <div class="coach-input">
                    <input type="text" id="coach-input" placeholder="Ask about the position..." autocomplete="off">
                    <button id="btn-coach-send" aria-label="Send message">
                        <span>➜</span>
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <div id="mode-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="mode-title">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="mode-title">Select Game Mode</h3>
            </div>
            <div class="mode-choices">
                <button id="btn-mode-bot" class="btn primary mode-btn">
                    <span class="btn-icon">🤖</span>
                    <span>Play vs AI</span>
                </button>
                <button id="btn-mode-online" class="btn primary mode-btn">
                    <span class="btn-icon">🌐</span>
                    <span>Play Online</span>
                </button>
            </div>
        </div>
    </div>

    <div id="lobby-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="lobby-title">
        <div class="modal-backdrop"></div>
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <button id="btn-lobby-back" class="icon-btn" aria-label="Back">←</button>
                <h3 id="lobby-title">Online Multiplayer</h3>
            </div>
            <div class="lobby-actions">
                <button id="btn-create-room" class="btn primary">Create Room</button>
                <div class="divider"><span>OR</span></div>
                <div class="join-room-container">
                    <input type="text" id="room-code-input" placeholder="Enter Room Code" maxlength="6">
                    <button id="btn-join-room" class="btn">Join</button>
                </div>
                <div id="lobby-msg" class="lobby-message"></div>
            </div>
        </div>
    </div>

    <div id="promotion-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="promotion-title">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="promotion-title">Select Promotion</h3>
            </div>
            <div class="promotion-choices" id="promotion-choices">
                <button class="promo-choice" data-piece="q" aria-label="Promote to Queen">
                    <span class="promo-piece">♛</span>
                    <span class="promo-label">Queen</span>
                </button>
                <button class="promo-choice" data-piece="r" aria-label="Promote to Rook">
                    <span class="promo-piece">♜</span>
                    <span class="promo-label">Rook</span>
                </button>
                <button class="promo-choice" data-piece="b" aria-label="Promote to Bishop">
                    <span class="promo-piece">♝</span>
                    <span class="promo-label">Bishop</span>
                </button>
                <button class="promo-choice" data-piece="n" aria-label="Promote to Knight">
                    <span class="promo-piece">♞</span>
                    <span class="promo-label">Knight</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js?v=2"></script>
</body>

</html>
